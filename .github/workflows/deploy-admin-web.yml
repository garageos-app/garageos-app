name: Deploy admin web asset

# Builds packages/admin-web with Vite and syncs the resulting dist/ to the
# CloudFront-fronted S3 bucket for the admin.* subdomain.
on:
  push:
    branches: [main]
    paths:
      - 'packages/admin-web/**'
      - '.github/workflows/deploy-admin-web.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-admin-web-asset
  cancel-in-progress: false

jobs:
  deploy:
    name: build admin-web + sync to s3 + cloudfront invalidation
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin web app
        run: pnpm --filter @garageos/admin-web build
        env:
          VITE_COGNITO_PLATFORM_ADMINS_POOL_ID: ${{ vars.VITE_COGNITO_PLATFORM_ADMINS_POOL_ID }}
          VITE_COGNITO_PLATFORM_ADMINS_CLIENT_ID: ${{ vars.VITE_COGNITO_PLATFORM_ADMINS_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Resolve stack outputs
        id: outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name GarageosAdminWebStack \
            --query "Stacks[0].Outputs[?OutputKey=='WebBucketName'].OutputValue" \
            --output text)
          DIST=$(aws cloudformation describe-stacks \
            --stack-name GarageosAdminWebStack \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          if [ -z "$BUCKET" ] || [ -z "$DIST" ]; then
            echo "::error::GarageosAdminWebStack outputs missing — has the CDK deploy run yet?"
            exit 1
          fi
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist=$DIST" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        run: |
          aws s3 sync packages/admin-web/dist/ \
            s3://${{ steps.outputs.outputs.bucket }}/ \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.dist }} \
            --paths '/*'
