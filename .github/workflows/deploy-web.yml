name: Deploy web asset

# Builds packages/web with Vite and syncs the resulting dist/ to the
# CloudFront-fronted S3 bucket. Triggered by changes to the web app
# itself, the workflow file, or — as a DR fallback — the legacy
# placeholder directory.
on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'infrastructure/assets/web-placeholder/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-web-asset
  cancel-in-progress: false

jobs:
  deploy:
    name: build web + sync to s3 + cloudfront invalidation
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @garageos/web build
        env:
          VITE_COGNITO_OFFICINE_POOL_ID: ${{ vars.VITE_COGNITO_OFFICINE_POOL_ID }}
          VITE_COGNITO_OFFICINE_CLIENT_ID: ${{ vars.VITE_COGNITO_OFFICINE_CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Resolve stack outputs
        id: outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name GarageosWebStack \
            --query "Stacks[0].Outputs[?OutputKey=='WebBucketName'].OutputValue" \
            --output text)
          DIST=$(aws cloudformation describe-stacks \
            --stack-name GarageosWebStack \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          if [ -z "$BUCKET" ] || [ -z "$DIST" ]; then
            echo "::error::GarageosWebStack outputs missing — has the CDK deploy run yet?"
            exit 1
          fi
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist=$DIST" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        run: |
          aws s3 sync packages/web/dist/ \
            s3://${{ steps.outputs.outputs.bucket }}/ \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.dist }} \
            --paths '/*'
