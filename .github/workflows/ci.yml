name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Forces JavaScript GitHub Actions (e.g. actions/checkout, setup-node) to run
# on Node 24 instead of the deprecated Node 20 runtime. Scope is limited to
# the action runtime — the Node version used by our own code is still
# controlled by setup-node + .nvmrc (Node 22 LTS).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma Client is generated code that TypeScript resolves at
      # compile time — typecheck fails without it. Generation does not
      # need a live database, only the schema, so this step runs with
      # no DATABASE_URL secret required.
      - run: pnpm db:generate
      - run: pnpm typecheck

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma client is generated (runtime dependency for the test
      # setup file that imports src/client.ts). A live DB is not
      # required for this step — generation works schema-only.
      - run: pnpm db:generate
      # Unit tests (validators + factories) run first: pure TypeScript,
      # no container needed, fail fast before the Docker-backed step
      # below. `-r` runs any package that defines `test:unit`.
      - run: pnpm -r test:unit
      # Testcontainers uses the runner's Docker daemon to spin up
      # postgres:15-alpine, apply all migrations (including 0002
      # RLS + triggers), seed system intervention types, then run
      # the integration suite inside a single fork that shares state.
      - run: pnpm --filter @garageos/database test:integration
      # @garageos/api integration suite: spins up its own Postgres
      # container (see packages/api/tests/integration/globalSetup.ts),
      # reuses the sibling database package's migrations and seed, and
      # exercises the full HTTP → tenantContext → withContext → RLS
      # chain end-to-end.
      - run: pnpm --filter @garageos/api test:integration
