name: Deploy infrastructure

# Triggers:
#   - push to main: auto-deploy GarageosMainStack on changes that affect
#     the deployed artifact (api/db/shared/infra source, lockfile, this
#     workflow). The `production` environment gates with required reviewer.
#   - workflow_dispatch: manual deploy of any stack (kept for OidcStack
#     bootstrap and ad-hoc redeploys).
on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - 'packages/api/**'
      - 'packages/database/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      stack:
        description: 'Which CDK stack to deploy'
        required: true
        default: 'GarageosMainStack'
        type: choice
        options:
          - GarageosOidcStack
          - GarageosMainStack
          - --all

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: cdk deploy
    runs-on: ubuntu-latest
    environment: production # Required reviewer gate, configured in GitHub Settings.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Required by NodejsFunction synth — see ci.yml cdk-synth job
      # for the same reason.
      - run: pnpm db:generate
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1
      - name: Deploy CDK stack
        # On push trigger `inputs.stack` is empty — fall back to MainStack,
        # which is the only stack that changes per feature. OidcStack is
        # bootstrap-only and redeployed via workflow_dispatch when needed.
        run: pnpm --filter infrastructure exec cdk deploy ${{ inputs.stack || 'GarageosMainStack' }} --require-approval never
