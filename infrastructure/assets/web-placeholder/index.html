<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GarageOS</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #f1f5f9;
        text-align: center;
        padding: 2rem;
      }
      main h1 {
        font-size: clamp(2.5rem, 6vw, 4rem);
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
      }
      main p {
        font-size: 1.125rem;
        color: #cbd5e1;
        margin: 0;
      }
      footer {
        position: fixed;
        bottom: 1rem;
        left: 0;
        right: 0;
        font-size: 0.75rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GarageOS</h1>
      <p>Stiamo preparando qualcosa di buono per te.</p>
    </main>
    <footer>
      <small>build __BUILD_SHA__ &middot; __BUILD_TIMESTAMP__</small>
    </footer>
  </body>
</html>
